<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link href="/favicon.ico" type="image/x-icon" rel="icon" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Discord Video Activity</title>
        <link rel="stylesheet" href="/styles.css">
        <script type="module" src="/script.js"></script>
    </head>
    <body>
        <div class="scale-viewport">
            <div class="container">
                <!--the player viewport-->
                <h3 id="video-title"></h3>
                <div class="video-wrapper">
                    <video id="player" controls></video>
                    <!-- Open the download endpoint in a new tab using the shown video title -->
                    <button id="downloadBtn" onclick="(function(){
                        try {
                            const titleEl = document.getElementById('video-title');
                            let name = (titleEl && titleEl.textContent) ? titleEl.textContent.trim() : '';
                            if (!name) return alert('No video selected to download');
                            if (!/\.mp4$/i.test(name)) name = name + '.mp4';
                            // encodeURIComponent the filename portion only
                            const url = '/download?name=' + encodeURIComponent(name);
                            window.open(url, '_blank');
                        } catch (e) { console.error(e); }
                    })()">Download</button>
                </div>
                <!--the input textbox for the user to enter the youtube url-->
                <div class="input-area">
                    <input
                        id="fileInput"
                        class="input-field"
                        type="text"
                        placeholder="Enter youtube link (Eg. https://www.youtube.com/watch?v=shortcode OR shortcode)"
                        autofocus
                    >
                </div>
                <div>
                    <p id="status" style="color:green; display:none; margin-top:8px;">Loading Video</p>
                </div>
            </div>
        </div>  
    </body>
</html>
